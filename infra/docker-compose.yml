# CivicTwin — Local Development Infrastructure
# Usage: cd infra && docker compose up -d

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: civictwin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civictwin}
      POSTGRES_USER: ${POSTGRES_USER:-civictwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civictwin_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civictwin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: civictwin-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
